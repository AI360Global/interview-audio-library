<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Learning Audio Library</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Interview Learning Audio Library</h1>
    <input type="text" id="search" placeholder="Search topics...">

    <div id="topics" class="topics">
      <div class="card">
        <h2>AWS DMS</h2>
        <audio controls preload="none">
          <source src="AWS-DMS-01.mp3" type="audio/mpeg">
        </audio>
      </div>

      <div class="card">
        <h2>ETL / DataStage</h2>
        <audio controls preload="none">
          <source src="ETL-Datastage-01.mp3" type="audio/mpeg">
        </audio>
      </div>

      <div class="card">
        <h2>SQL Server</h2>
        <audio controls preload="none">
          <source src="SQLServer-01.mp3" type="audio/mpeg">
        </audio>
      </div>

      <div class="card">
        <h2>MongoDB</h2>
        <audio controls preload="none">
          <source src="MongoDB-01.mp3" type="audio/mpeg">
        </audio>
      </div>

      <div class="card">
        <h2>DB2</h2>
        <audio controls preload="none">
          <source src="DB2-01.mp3" type="audio/mpeg">
        </audio>
      </div>

      <div class="card">
        <h2>Sybase</h2>
        <audio controls preload="none">
          <source src="Sybase-01.mp3" type="audio/mpeg">
        </audio>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
